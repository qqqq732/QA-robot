<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>文档问答机器人</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Microsoft YaHei,sans-serif;display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;background:#202123;color:#fff;display:flex;flex-direction:column}
.sidebar-header{padding:16px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid #444}
.sidebar-top{display:flex;justify-content:space-between;align-items:center}
.btn{background:#343541;color:#fff;border:1px solid #565869;padding:8px 12px;border-radius:6px;cursor:pointer}
.btn:hover{background:#40414f}
#fileInput{display:none}
.history-list{flex:1;overflow-y:auto;padding:8px}
.history-item{padding:10px 12px;border-radius:6px;margin-bottom:4px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-item:hover{background:#2a2b32}
.history-item.active{background:#343541}
.main{flex:1;display:flex;flex-direction:column;background:#f7f7f8}
.chat-container{flex:1;padding:20px;overflow-y:auto}
.message{max-width:75%;margin-bottom:16px;line-height:1.6}
.user{margin-left:auto;background:#0b76ef;color:#fff;padding:12px 16px;border-radius:12px 12px 0 12px}
.ai{margin-right:auto;background:#e5e5ea;color:#333;padding:12px 16px;border-radius:12px 12px 12px 0}
.input-area{display:flex;padding:12px;border-top:1px solid #ddd;background:#fff}
#query-input{flex:1;border:1px solid #ccc;border-radius:20px;padding:10px 16px;outline:none;font-size:15px}
#send-btn{margin-left:10px;border:none;background:#0b76ef;color:#fff;padding:10px 16px;border-radius:20px;cursor:pointer}
</style>
</head>
<body>

<<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-top">
      <span>历史对话</span>
      <button class="btn" id="newChatBtn">+ 新对话</button>
    </div>
    <button class="btn" id="uploadBtn">+ 知识库</button>
    <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx,.xlsx">
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<div class="main">
  <div class="chat-container" id="chat-container"></div>
  <div class="input-area">
    <input type="text" id="query-input" placeholder="发送消息...">
    <button id="send-btn">发送</button>
  </div>
</div>

<script>
const STORAGE_KEY = "chat_sessions";
let sessions = [];
let currentSessionId = "default";

function uuid(){return crypto.randomUUID()}

// 会话管理
function loadSessions(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(!raw){sessions=[{id:"default",title:"新对话",messages:[]}]}else{sessions=JSON.parse(raw)}
  currentSessionId=sessions[0].id;renderHistory();loadChat(currentSessionId)
}

function renderHistory(){
  const el=document.getElementById("history-list");el.innerHTML="";
  sessions.forEach(s=>{
    const item=document.createElement("div");
    item.className="history-item"+(s.id===currentSessionId?" active":"");
    item.textContent=s.title;
    item.onclick=()=>{currentSessionId=s.id;renderHistory();loadChat(currentSessionId)}
    el.appendChild(item)
  })
}

function loadChat(id){
  const s=sessions.find(x=>x.id===id);
  const c=document.getElementById("chat-container");c.innerHTML="";
  s.messages.forEach(m=>{if(m.role!=="system")addMsg(m.content,m.role==="user"?"user":"ai")})
}

function addMsg(text,role){
  const d=document.createElement("div");d.className="message "+role;d.textContent=text;
  document.getElementById("chat-container").appendChild(d);
  document.getElementById("chat-container").scrollTop = document.getElementById("chat-container").scrollHeight;
}

// 上传文档到知识库（当前会话的知识库）
async function uploadFile(){
  const file=document.getElementById("fileInput").files[0];
  if(!file){alert("请选择文件");return}
  const fd=new FormData();
  fd.append("file",file);
  fd.append("kb_id",currentSessionId); // 每个会话独立知识库
  try{
    const r=await fetch("http://127.0.0.1:8000/api/upload",{method:"POST",body:fd});
    const data=await r.json();
    alert(data.status==="ok"?"上传成功，已生成知识库":"上传失败："+data.msg)
  }catch(e){
    alert("上传出错："+e.message)
  }
}

// 发送聊天
async function send(){
  const q=document.getElementById("query-input").value.trim();
  if(!q)return;
  const s=sessions.find(x=>x.id===currentSessionId);
  s.messages.push({role:"user",content:q});
  addMsg(q,"user");
  document.getElementById("query-input").value="";

  const hist=s.messages.filter(m=>m.role!=="system").map(m=>({role:m.role,content:m.content}));

  const res=await fetch("http://127.0.0.1:8000/api/chat/stream",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      query:q,
      history:hist,
      kb_id:currentSessionId
    })
  })

  const reader=res.body.getReader();
  const dec=new TextDecoder();
  let buf="";
  const aiDiv=document.createElement("div");
  aiDiv.className="message ai";
  document.getElementById("chat-container").appendChild(aiDiv);

  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    const chunk=dec.decode(value);
    const lines=chunk.split("\n");
    for(const line of lines){
      if(line.startsWith("data: ")){
        const t=line.replace("data: ","").trim();
        if(t){buf+=t;aiDiv.textContent=buf;}
      }
    }
    document.getElementById("chat-container").scrollTop = document.getElementById("chat-container").scrollHeight;
  }
  s.messages.push({role:"assistant",content:buf});
  if(s.title==="新对话"){
    s.title=q.length>20?q.slice(0,20)+"...":q;
  }
  localStorage.setItem(STORAGE_KEY,JSON.stringify(sessions));
  renderHistory();
}

// 绑定事件
document.getElementById("send-btn").onclick=send;
document.getElementById("query-input").onkeydown=e=>e.key==="Enter"&&send();

document.getElementById("newChatBtn").onclick=()=>{
  sessions.unshift({id:uuid(),title:"新对话",messages:[]});
  currentSessionId=sessions[0].id;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(sessions));
  renderHistory();
  loadChat(currentSessionId);
}

document.getElementById("uploadBtn").onclick=()=>{
  document.getElementById("fileInput").click();
}
document.getElementById("fileInput").onchange=uploadFile;

// 初始化
loadSessions();
</script>
</body>
</html>
